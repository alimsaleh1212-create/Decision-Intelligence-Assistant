# Serve the Vite build as a SPA.
# All unknown routes fall back to index.html so client-side routing works.
server {
    listen 3000;

    # Serve built assets from the Vite output directory
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets aggressively; index.html never cached
    location ~* \.(?:js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store";
    }

    # Disable server version in headers (minimal information disclosure)
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
